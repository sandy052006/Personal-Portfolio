<section id="contact" class="py-24 px-6 bg-slate-950 text-slate-300">
  <div class="max-w-3xl mx-auto">

    <div class="text-center mb-16">
      <h2 class="text-4xl md:text-5xl font-extrabold text-white mb-4">Get In Touch</h2>
      <div class="w-24 h-1 bg-cyan-400 mx-auto rounded-full mb-6"></div>
      <p class="text-lg text-slate-400">
        Have a project in mind, a question, or just want to say hi? Drop me a message!
      </p>
    </div>

    <div class="bg-slate-900 p-8 md:p-10 rounded-2xl border border-slate-800 shadow-xl">
      <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" class="space-y-6">
        
        <div>
          <label for="name" class="block text-sm font-medium text-cyan-400 mb-2">Name</label>
          <input type="text" id="name" name="name" required 
            class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-lg text-white focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-colors" 
            placeholder="John Doe">
        </div>

        <div>
          <label for="email" class="block text-sm font-medium text-cyan-400 mb-2">Email</label>
          <input type="email" id="email" name="email" required 
            class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-lg text-white focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-colors" 
            placeholder="john@example.com">
        </div>

        <div>
          <label for="message" class="block text-sm font-medium text-cyan-400 mb-2">Message</label>
          <textarea id="message" name="message" rows="5" required 
            class="w-full px-4 py-3 bg-slate-950 border border-slate-800 rounded-lg text-white focus:outline-none focus:border-cyan-400 focus:ring-1 focus:ring-cyan-400 transition-colors resize-none" 
            placeholder="How can I help you?"></textarea>
        </div>

        <button type="submit" 
          class="w-full py-4 bg-cyan-400 text-slate-950 font-bold text-lg rounded-lg hover:bg-cyan-300 transition-colors mt-4">
          Send Message
        </button>

      </form>
    </div>

  </div>
</section>
